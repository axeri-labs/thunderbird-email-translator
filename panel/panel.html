<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Hungarian Translation</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        html, body {
            width: 540px;
            min-height: 200px;
            max-height: 700px;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
            font-size: 13px;
            color: #111;
            background: #eef5ff;
            display: flex;
            flex-direction: column;
        }

        #header {
            background: #0055aa;
            color: white;
            padding: 9px 12px;
            display: flex;
            align-items: center;
            gap: 7px;
            font-weight: 600;
            font-size: 13px;
            flex-shrink: 0;
            user-select: none;
        }

        .hu-badge {
            background: #cc0000;
            color: white;
            font-size: 11px;
            font-weight: bold;
            border-radius: 3px;
            padding: 1px 5px;
            letter-spacing: 0.5px;
        }

        #lang-info {
            font-size: 11px;
            font-weight: normal;
            background: rgba(255,255,255,0.2);
            border-radius: 4px;
            padding: 1px 6px;
            margin-left: auto;
        }

        #content {
            flex: 1;
            padding: 14px 16px;
            overflow-y: auto;
            line-height: 1.7;
        }

        #content p { margin-bottom: 9px; }
        #content p:last-child { margin-bottom: 0; }

        .loading {
            color: #555;
            font-style: italic;
            display: flex;
            align-items: center;
            gap: 9px;
        }

        .spinner {
            display: inline-block;
            width: 15px;
            height: 15px;
            border: 2px solid #aac4e8;
            border-top-color: #0055aa;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            flex-shrink: 0;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        .error {
            color: #aa0000;
            background: #fff0f0;
            border: 1px solid #ffcccc;
            border-radius: 4px;
            padding: 9px 12px;
        }
    </style>
</head>
<body>
    <div id="header">
        <span class="hu-badge">HU</span>
        Hungarian Translation
        <span id="lang-info"></span>
    </div>
    <div id="content">
        <div class="loading">
            <span class="spinner"></span>
            Translating…
        </div>
    </div>
    <script type="module" src="panel.js"></script>
</body>
</html>
