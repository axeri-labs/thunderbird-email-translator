<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Email Translator – Settings</title>
    <style>
        body {
            font-family: -apple-system, "Segoe UI", Arial, sans-serif;
            font-size: 14px;
            color: #111;
            background: #fff;
            margin: 0;
            padding: 24px 32px;
            max-width: 480px;
        }

        h1 {
            font-size: 18px;
            font-weight: 600;
            margin: 0 0 24px;
            border-bottom: 1px solid #ddd;
            padding-bottom: 12px;
        }

        .setting {
            display: flex;
            align-items: flex-start;
            gap: 12px;
            padding: 14px 0;
            border-bottom: 1px solid #f0f0f0;
        }

        .setting input[type="checkbox"] {
            margin-top: 2px;
            width: 16px;
            height: 16px;
            flex-shrink: 0;
            cursor: pointer;
        }

        .setting label {
            cursor: pointer;
        }

        .setting-title {
            font-weight: 600;
            margin-bottom: 3px;
        }

        .setting-desc {
            font-size: 12px;
            color: #666;
            line-height: 1.5;
        }

        #status {
            margin-top: 16px;
            font-size: 12px;
            color: #0055aa;
            min-height: 16px;
        }
    </style>
</head>
<body>
    <h1>Email Translator</h1>

    <div class="setting">
        <div style="flex:1">
            <div class="setting-title">Target language</div>
            <div class="setting-desc">Which language should emails be translated into?</div>
        </div>
        <select id="targetLang" style="margin-top:2px;font-size:14px;padding:4px 8px;border:1px solid #ccc;border-radius:4px;background:#fff;cursor:pointer;">
            <option value="hu">Hungarian</option>
            <option value="en">English</option>
            <option value="de">German</option>
            <option value="fr">French</option>
            <option value="es">Spanish</option>
            <option value="it">Italian</option>
            <option value="pt">Portuguese</option>
            <option value="nl">Dutch</option>
            <option value="pl">Polish</option>
            <option value="cs">Czech</option>
            <option value="sk">Slovak</option>
            <option value="ro">Romanian</option>
            <option value="hr">Croatian</option>
            <option value="ru">Russian</option>
            <option value="uk">Ukrainian</option>
            <option value="tr">Turkish</option>
            <option value="ar">Arabic</option>
            <option value="zh-CN">Chinese (Simplified)</option>
            <option value="ja">Japanese</option>
            <option value="ko">Korean</option>
        </select>
    </div>

    <div class="setting">
        <input type="checkbox" id="autoTranslate">
        <label for="autoTranslate">
            <div class="setting-title">Auto-translate</div>
            <div class="setting-desc">When enabled, every opened email is translated automatically. When disabled, translation starts only when the button is pressed.</div>
        </label>
    </div>

    <div id="status"></div>

    <script type="module" src="options.js"></script>
</body>
</html>
