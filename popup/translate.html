<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            width: 480px;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
            font-size: 13px;
            color: #111;
            background: #eef5ff;
        }

        #header {
            background: #0055aa;
            color: white;
            padding: 9px 14px;
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 600;
            font-size: 13px;
        }

        .hu-badge {
            background: #cc0000;
            color: white;
            font-size: 11px;
            font-weight: bold;
            border-radius: 3px;
            padding: 1px 5px;
            letter-spacing: 0.5px;
        }

        .lang-badge {
            font-size: 11px;
            font-weight: normal;
            background: rgba(255,255,255,0.2);
            border-radius: 4px;
            padding: 1px 7px;
            margin-left: auto;
        }

        #content {
            padding: 12px 14px;
            max-height: 460px;
            overflow-y: auto;
            line-height: 1.65;
        }

        #content p {
            margin-bottom: 8px;
        }
        #content p:last-child {
            margin-bottom: 0;
        }

        .loading {
            color: #555;
            font-style: italic;
            display: flex;
            align-items: center;
            gap: 9px;
            padding: 4px 0;
        }

        .spinner {
            display: inline-block;
            width: 15px;
            height: 15px;
            border: 2px solid #aac4e8;
            border-top-color: #0055aa;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            flex-shrink: 0;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .error {
            color: #aa0000;
            background: #fff0f0;
            border: 1px solid #ffcccc;
            border-radius: 4px;
            padding: 8px 10px;
        }
    </style>
</head>
<body>
    <div id="header">
        <span class="hu-badge">HU</span>
        Hungarian Translation
        <span class="lang-badge" id="lang-info"></span>
    </div>
    <div id="content">
        <div class="loading">
            <span class="spinner"></span>
            Translating…
        </div>
    </div>
    <script src="translate.js"></script>
</body>
</html>
